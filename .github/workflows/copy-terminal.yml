name: Copy Terminal from Playground

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  copy-terminal:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out THIS repository (the website)
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Check out the playground repository
      - name: Checkout playground repo
        uses: actions/checkout@v4
        with:
          repository: NTcompanyYT/playground
          path: playground-repo

      # 3. Copy terminal.html → terminal/index.html
      - name: Copy terminal files
        run: |
          mkdir -p terminal
          cp playground-repo/terminal/terminal.html terminal/index.html
          # optional: copy readme so the folder isn't empty if you want
          cp playground-repo/terminal/README.md terminal/README.md

      # 4. Commit and push back to the website repo
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terminal/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Copy terminal from playground"
            git push
          fi
